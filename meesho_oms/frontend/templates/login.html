<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Login — Meesho OMS</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet"/>
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"/>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Plus Jakarta Sans', sans-serif;
    background: #F7F5F2;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .login-wrap {
    width: 100%;
    max-width: 420px;
    padding: 20px;
  }
  .login-card {
    background: #fff;
    border-radius: 20px;
    padding: 40px 36px;
    box-shadow: 0 4px 24px rgba(0,0,0,.08);
  }
  .login-brand {
    text-align: center;
    margin-bottom: 32px;
  }
  .login-icon {
    width: 56px; height: 56px;
    background: #E8553E;
    border-radius: 16px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 26px;
    color: #fff;
    margin-bottom: 14px;
  }
  .login-title { font-size: 22px; font-weight: 800; color: #1A1714; }
  .login-sub   { font-size: 13px; color: #6B6560; margin-top: 4px; }

  .form-group { margin-bottom: 16px; }
  .form-label {
    font-size: 12px; font-weight: 600;
    color: #6B6560; text-transform: uppercase;
    letter-spacing: .04em; margin-bottom: 6px;
    display: block;
  }
  .form-control {
    width: 100%; padding: 11px 14px;
    border: 1.5px solid #E5E2DE;
    border-radius: 10px;
    font-size: 14px; font-family: inherit;
    outline: none; transition: border .15s;
    background: #F7F5F2;
  }
  .form-control:focus { border-color: #E8553E; background: #fff; }

  .input-wrap { position: relative; }
  .input-wrap .form-control { padding-right: 42px; }
  .toggle-pass {
    position: absolute; right: 12px; top: 50%;
    transform: translateY(-50%);
    background: none; border: none;
    color: #A09B96; cursor: pointer;
    font-size: 16px;
  }

  .btn-login {
    width: 100%; padding: 12px;
    background: #E8553E; color: #fff;
    border: none; border-radius: 10px;
    font-size: 15px; font-weight: 700;
    font-family: inherit; cursor: pointer;
    transition: background .15s;
    margin-top: 8px;
  }
  .btn-login:hover { background: #C43D28; }
  .btn-login:disabled { background: #ccc; cursor: not-allowed; }

  .error-msg {
    background: #FFF0ED; color: #C43D28;
    border: 1px solid #E8553E;
    border-radius: 8px; padding: 10px 14px;
    font-size: 13px; margin-bottom: 16px;
    display: none;
  }
  .error-msg.show { display: block; }

  .login-footer {
    text-align: center;
    margin-top: 24px;
    font-size: 12px;
    color: #A09B96;
  }

  .default-creds {
    background: #EEF3FF;
    border-radius: 8px;
    padding: 10px 14px;
    font-size: 12px;
    color: #4A7CF7;
    margin-bottom: 20px;
    text-align: center;
  }
</style>
</head>
<body>
<div class="login-wrap">
  <div class="login-card">
    <div class="login-brand">
      <div class="login-icon"><i class="bi bi-bag-heart-fill"></i></div>
      <div class="login-title">Meesho OMS</div>
      <div class="login-sub">Inventory & Order Manager</div>
    </div>

    <div class="default-creds">
      <i class="bi bi-info-circle me-1"></i>
      Default: <strong>admin</strong> / <strong>admin123</strong>
    </div>

    <div class="error-msg" id="errorMsg"></div>

    <div class="form-group">
      <label class="form-label">Username</label>
      <input type="text" class="form-control" id="username"
             placeholder="Enter username" autocomplete="username"/>
    </div>

    <div class="form-group">
      <label class="form-label">Password</label>
      <div class="input-wrap">
        <input type="password" class="form-control" id="password"
               placeholder="Enter password" autocomplete="current-password"/>
        <button class="toggle-pass" onclick="togglePassword()" type="button">
          <i class="bi bi-eye" id="eyeIcon"></i>
        </button>
      </div>
    </div>

    <button class="btn-login" id="loginBtn" onclick="doLogin()">
      <i class="bi bi-box-arrow-in-right me-2"></i>Login
    </button>

    <div class="login-footer">
      Meesho OMS v1.0 &copy; 2024
    </div>
  </div>
</div>

<script>
async function doLogin() {
  const username = document.getElementById("username").value.trim();
  const password = document.getElementById("password").value.trim();
  const errorEl  = document.getElementById("errorMsg");
  const btn      = document.getElementById("loginBtn");

  errorEl.classList.remove("show");

  if (!username || !password) {
    errorEl.textContent = "Username aur password dono bharo";
    errorEl.classList.add("show");
    return;
  }

  btn.disabled = true;
  btn.innerHTML = `<span class="spinner-border spinner-border-sm me-2"
    style="width:14px;height:14px;border-width:2px"></span>Logging in…`;

  try {
    const res  = await fetch("/api/auth/login", {
      method:  "POST",
      headers: {"Content-Type": "application/json"},
      body:    JSON.stringify({username, password})
    });
    const data = await res.json();

    if (res.ok) {
      window.location.href = "/";
    } else {
      errorEl.textContent = data.error || "Login failed";
      errorEl.classList.add("show");
      btn.disabled = false;
      btn.innerHTML = `<i class="bi bi-box-arrow-in-right me-2"></i>Login`;
    }
  } catch (e) {
    errorEl.textContent = "Server error. Try again.";
    errorEl.classList.add("show");
    btn.disabled = false;
    btn.innerHTML = `<i class="bi bi-box-arrow-in-right me-2"></i>Login`;
  }
}

function togglePassword() {
  const input = document.getElementById("password");
  const icon  = document.getElementById("eyeIcon");
  if (input.type === "password") {
    input.type  = "text";
    icon.className = "bi bi-eye-slash";
  } else {
    input.type  = "password";
    icon.className = "bi bi-eye";
  }
}

// Enter key support
document.addEventListener("keypress", e => {
  if (e.key === "Enter") doLogin();
});
</script>
</body>
</html>
